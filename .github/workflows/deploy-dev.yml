name: Deploy AgPro Dev Local

on:
  push:
    branches: [ "dev" ] #<<<>>> comit

jobs:
  deploy:
    runs-on: self-hosted # <--- Isso diz para rodar na sua VM do VirtualBox
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Subir Infraestrutura (Docker)
        run: |
          # O GitHub Actions vai rodar isso dentro da sua VM
          cd $GITHUB_WORKSPACE
          docker-compose up -d --build