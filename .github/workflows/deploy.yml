name: Deploy AgPro Backend

on:
  push:
    branches: [ main ] # Dispara o deploy toda vez que você der push na main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Executar comandos na VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Entra na pasta do projeto (garanta que ela exista na VM)
            mkdir -p ~/projetos/server_agepro_app
            cd ~/projetos/server_agepro_app
            
            # 2. Lógica Inteligente: Se já for um repositório git, apenas atualiza.
            # Se não for, limpa o que for lixo (exceto o .env) e clona.
            if [ -d ".git" ]; then
              echo "Diretório já é um repositório. Atualizando..."
              git pull origin main
            else
              echo "Pasta existe mas não é git. Preparando para clone..."
              # Remove tudo EXCETO o arquivo .env para o clone funcionar
              find . -maxdepth 1 ! -name '.env' ! -name '.' -exec rm -rf {} +
              git clone https://github.com/MaurilioSemeao/server_agepro_app.git .
            fi
            
            # Sobe os containers (Buildando a imagem nova)
            sudo docker-compose up -d --build